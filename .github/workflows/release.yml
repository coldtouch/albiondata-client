name: Build and Release

on:
  release:
    types: [created]

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get -y install nsis

      - name: Build
        run: make build-windows

      - name: Upload Windows Installer
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: albiondata-client-amd64-installer.exe

      - name: Upload Windows Update Archive
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: update-windows-amd64.exe.gz

      - name: Upload itemmap.json
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: itemmap.json
          overwrite: true

      - name: Upload weightmap.json
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: weightmap.json
          overwrite: true

  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: make build-linux

      - name: Upload Linux Update Archive
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: update-linux-amd64.gz

  build-darwin:
    name: Build macOS Client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: |
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" CGO_LDFLAGS="-arch x86_64" \
            go build -ldflags "-s -w -X main.version=$GITHUB_REF_NAME" albiondata-client.go

      - name: Package
        run: |
          gzip -k9 albiondata-client
          mv albiondata-client.gz update-darwin-amd64.gz

          TEMP="albiondata-client"
          ZIPNAME="albiondata-client-amd64-mac.zip"
          rm -rf ./scripts/$TEMP
          mkdir -p ./scripts/$TEMP
          cp albiondata-client ./scripts/$TEMP/albiondata-client-executable
          cp scripts/run.command ./scripts/$TEMP/run.command
          chmod 777 ./scripts/$TEMP/*
          cd scripts && zip -r ../$ZIPNAME ./"$TEMP"

      - name: Upload macOS Update Archive
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: update-darwin-amd64.gz

      - name: Upload macOS Zip
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: albiondata-client-amd64-mac.zip
