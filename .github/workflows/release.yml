name: Build and Release

# Triggers on tag push (v*) — same trigger as tag-release.yml. The two run in parallel,
# tag-release creates the Release record with auto-generated notes, and this workflow
# uploads the binary assets to the same Release (softprops/action-gh-release appends
# to an existing release when tag_name matches).
#
# Also runs on workflow_dispatch so we can re-build a release manually if needed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build assets for (e.g. v0.7.3)'
        required: true

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install NSIS + libpcap
        run: sudo apt-get update && sudo apt-get -y install nsis libpcap-dev

      - name: Build
        run: make build-windows

      - name: Upload Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            albiondata-client-amd64-installer.exe
            update-windows-amd64.exe.gz
            itemmap.json
            weightmap.json
            config.yaml.example

  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get -y install libpcap-dev

      - name: Build
        run: make build-linux

      - name: Upload Linux asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: update-linux-amd64.gz

  build-darwin:
    name: Build macOS Client
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install libpcap
        run: brew install libpcap || true

      - name: Build
        run: |
          TAG_REF="${{ github.event.inputs.tag || github.ref_name }}"
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" CGO_LDFLAGS="-arch x86_64" \
            go build -ldflags "-s -w -X main.version=$TAG_REF" albiondata-client.go

      - name: Package
        run: |
          gzip -k9 albiondata-client
          mv albiondata-client.gz update-darwin-amd64.gz

          TEMP="albiondata-client"
          ZIPNAME="albiondata-client-amd64-mac.zip"
          rm -rf ./scripts/$TEMP
          mkdir -p ./scripts/$TEMP
          cp albiondata-client ./scripts/$TEMP/albiondata-client-executable
          cp scripts/run.command ./scripts/$TEMP/run.command
          chmod 777 ./scripts/$TEMP/*
          cd scripts && zip -r ../$ZIPNAME ./"$TEMP"

      - name: Upload macOS assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            update-darwin-amd64.gz
            albiondata-client-amd64-mac.zip
